<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Recipe Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
background-color: #fdf6ec;
font-family: ‘DM Sans’, Georgia, sans-serif;
color: #2c1a10;
min-height: 100vh;
}

/* Hero */
.hero {
background-color: #3d2b1f;
padding: 3.5rem 2rem 3rem;
text-align: center;
position: relative;
overflow: hidden;
}
.hero-blob1 {
position: absolute; top: -60px; right: -60px;
width: 280px; height: 280px;
background-color: #e8a020; border-radius: 50%; opacity: 0.12; pointer-events: none;
}
.hero-blob2 {
position: absolute; bottom: -80px; left: -30px;
width: 220px; height: 220px;
background-color: #d4607a; border-radius: 50%; opacity: 0.09; pointer-events: none;
}
.hero-label {
display: inline-block;
background-color: #e8a020; color: #3d2b1f;
font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
padding: 0.3rem 0.9rem; border-radius: 20px; margin-bottom: 1.2rem;
position: relative; z-index: 1;
}
.hero h1 {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 2.8rem; color: #fdf6ec; line-height: 1.15; margin-bottom: 0.7rem;
position: relative; z-index: 1;
}
.hero h1 em { color: #f5c860; font-style: italic; }
.hero-sub {
color: #f2b5c0; font-size: 0.9rem; font-weight: 300;
position: relative; z-index: 1;
}
.hero-count {
display: inline-flex; align-items: center; margin-top: 1.8rem;
border: 1px solid rgba(255,255,255,0.15); border-radius: 40px;
background-color: rgba(255,255,255,0.06); position: relative; z-index: 1; overflow: hidden;
}
.hero-stat {
display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.7rem 1.8rem;
}
.hero-stat-num { font-size: 1.2rem; font-weight: 600; color: #f5c860; line-height: 1; }
.hero-stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); line-height: 1; }
.hero-divider { width: 1px; height: 32px; background-color: rgba(255,255,255,0.15); flex-shrink: 0; }

/* Filter bar */
.filter-bar {
background-color: #fffaf4;
border-bottom: 1.5px solid #ead8c0;
padding: 1rem 1.5rem;
position: sticky;
top: 0;
z-index: 100;
}
.filter-scroll {
display: flex;
gap: 0.5rem;
overflow-x: auto;
scrollbar-width: none;
-ms-overflow-style: none;
max-width: 900px;
margin: 0 auto;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-btn {
display: inline-flex;
align-items: center;
gap: 0.35rem;
padding: 0.4rem 0.9rem;
border-radius: 20px;
border: 1.5px solid #ead8c0;
background-color: white;
color: #7a4f35;
font-size: 0.75rem;
font-weight: 500;
font-family: ‘DM Sans’, Georgia, sans-serif;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
letter-spacing: 0.02em;
}
.filter-btn:hover { border-color: #e8a020; color: #e8a020; }
.filter-btn.active {
background-color: #3d2b1f;
border-color: #3d2b1f;
color: #f5c860;
}
.filter-btn .tag-dot {
width: 6px; height: 6px; border-radius: 50%; background-color: currentColor; opacity: 0.6;
}

/* No results */
.no-results {
text-align: center;
padding: 3rem 1rem;
color: #8a6a55;
font-style: italic;
display: none;
}

/* Main */
.main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }

.category { margin-bottom: 3rem; }
.category.hidden { display: none; }

.category-header {
display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem;
}
.category-title {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 1.3rem; color: #3d2b1f; white-space: nowrap;
}
.category-line { flex: 1; height: 1.5px; background: linear-gradient(to right, #f5c860, transparent); }
.category-count { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #8a6a55; white-space: nowrap; }

/* Cards */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }

.card {
background-color: #fffaf4; border: 1.5px solid #ead8c0; border-radius: 16px;
overflow: hidden; text-decoration: none; color: inherit;
transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
display: flex; flex-direction: column;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(61,43,31,0.12); border-color: #e8a020; }
.card.hidden { display: none; }

.card-accent { height: 5px; }
.card-accent-green { background: linear-gradient(to right, #4a7c59, #e8a020); }
.card-accent-pink  { background: linear-gradient(to right, #d4607a, #f5c860); }
.card-accent-default { background: linear-gradient(to right, #e8a020, #d4607a); }

.card-body { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; }

.card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
.card-tag {
font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
padding: 0.2rem 0.6rem; border-radius: 10px; background-color: #f9efe0; color: #7a4f35;
cursor: pointer; transition: opacity 0.15s;
}
.card-tag:hover { opacity: 0.75; }
.card-tag-green { background-color: #e8f2eb; color: #4a7c59; }
.card-tag-pink  { background-color: #fdeef2; color: #d4607a; }
.card-tag-gold  { background-color: #fef5e0; color: #b07d10; }
.card-tag-blue  { background-color: #e8f0fb; color: #3a6bc4; }

.card-title {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 1.05rem; color: #3d2b1f; line-height: 1.3; margin-bottom: 0.5rem;
}
.card-desc { font-size: 0.8rem; color: #8a6a55; line-height: 1.55; flex: 1; }

.card-meta {
display: flex; gap: 1rem; margin-top: 1rem;
padding-top: 0.8rem; border-top: 1px solid #ead8c0;
}
.card-meta-item { display: flex; flex-direction: column; gap: 0.15rem; }
.card-meta-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: #e8a020; }
.card-meta-val { font-size: 0.78rem; font-weight: 500; color: #3d2b1f; }
.card-arrow { margin-top: 1rem; font-size: 0.78rem; color: #e8a020; font-weight: 500; }

.card-empty {
background-color: #f9efe0; border: 1.5px dashed #d4b896; border-radius: 16px;
padding: 1.5rem 1.2rem; display: flex; flex-direction: column;
align-items: center; justify-content: center; text-align: center; gap: 0.5rem; min-height: 160px;
}
.card-empty-icon { font-size: 1.5rem; opacity: 0.35; }
.card-empty-text { font-size: 0.8rem; color: #8a6a55; font-style: italic; }

.footer {
text-align: center; padding: 2rem 1rem; font-size: 0.75rem; color: #8a6a55;
opacity: 0.5; border-top: 1px solid #ead8c0;
}

@media (max-width: 500px) {
.cards-grid { grid-template-columns: 1fr; }
.hero { padding: 2.5rem 1.2rem 2rem; }
.hero h1 { font-size: 2rem; }
}
</style>

</head>
<body>

<div class="hero">
  <div class="hero-blob1"></div>
  <div class="hero-blob2"></div>
  <div class="hero-label">🍳 Personal Collection</div>
  <h1>My <em>Recipe</em> Library</h1>
  <p class="hero-sub">Saved favorites, organized and ready to cook.</p>
  <div class="hero-count">
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-recipes">1</div>
      <div class="hero-stat-label">Recipes</div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-categories">1</div>
      <div class="hero-stat-label">Categories</div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-scroll" id="filter-bar"></div>
</div>

<div class="main" id="main"></div>

<div class="no-results" id="no-results">No recipes found for this filter.</div>

<div class="footer">My Recipe Collection · Built with Claude</div>

<script>
// ============================================================
// RECIPE DATA — add new recipes here
// ============================================================
const recipes = [
  {
    title: "Turmeric Coconut Braised Cabbage with Chickpeas",
    desc: "Anti-inflammatory and vegan. Served over brown rice with a homemade roasted red pepper sesame sauce.",
    tags: ["Vegetarian", "GERD Friendly", "Vegan"],
    category: "Vegetarian Dishes",
    categoryIcon: "🌿",
    accent: "green",
    prep: "15 min",
    cook: "35 min",
    serves: "4",
    href: "Vegetarian/cabbage-recipe.html"
  }
  // Add more recipes here following the same format
];

// ============================================================
// TAG COLOR MAP — add tag colors here as new tags are introduced
// ============================================================
const tagColors = {
  "Vegetarian":        "green",
  "Vegan":             "green",
  "Anti-Inflammatory": "green",
  "GERD Friendly":     "pink",
  "Quick":             "gold",
  "High Protein":      "blue",
  "Gluten Free":       "gold",
  "Dairy Free":        "pink",
  "PCOS Friendly":     "pink",
  "Weight Loss":       "blue"
};

// ============================================================
// BUILD UI
// ============================================================
let activeFilter = "All";

function getTagClass(tag) {
  const color = tagColors[tag];
  if (color === "green") return "card-tag-green";
  if (color === "pink")  return "card-tag-pink";
  if (color === "gold")  return "card-tag-gold";
  if (color === "blue")  return "card-tag-blue";
  return "";
}

function getAllTags() {
  const set = new Set();
  recipes.forEach(r => r.tags.forEach(t => set.add(t)));
  return Array.from(set).sort();
}

function buildFilterBar() {
  const bar = document.getElementById("filter-bar");
  const tags = ["All", ...getAllTags()];
  bar.innerHTML = tags.map(tag => `
    <button class="filter-btn ${tag === activeFilter ? 'active' : ''}"
      onclick="setFilter('${tag}')">
      ${tag !== "All" ? '<span class="tag-dot"></span>' : '🍽'}
      ${tag}
    </button>
  `).join('');
}

function buildRecipes() {
  const main = document.getElementById("main");

  // Group by category
  const categoryMap = {};
  recipes.forEach(r => {
    if (!categoryMap[r.category]) {
      categoryMap[r.category] = { icon: r.categoryIcon, items: [] };
    }
    categoryMap[r.category].items.push(r);
  });

  let html = "";
  for (const [catName, catData] of Object.entries(categoryMap)) {
    const slug = catName.replace(/\s+/g, '-').toLowerCase();
    html += `
      <div class="category" id="cat-${slug}">
        <div class="category-header">
          <div class="category-title">${catData.icon} ${catName}</div>
          <div class="category-line"></div>
          <div class="category-count" id="count-${slug}">${catData.items.length} Recipe${catData.items.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="cards-grid">
          ${catData.items.map((r, i) => `
            <a class="card" href="${r.href}" data-tags="${r.tags.join(',')}">
              <div class="card-accent card-accent-${r.accent || 'default'}"></div>
              <div class="card-body">
                <div class="card-tags">
                  ${r.tags.map(t => `<span class="card-tag ${getTagClass(t)}">${t}</span>`).join('')}
                </div>
                <div class="card-title">${r.title}</div>
                <div class="card-desc">${r.desc}</div>
                <div class="card-meta">
                  <div class="card-meta-item">
                    <span class="card-meta-label">Prep</span>
                    <span class="card-meta-val">${r.prep}</span>
                  </div>
                  <div class="card-meta-item">
                    <span class="card-meta-label">Cook</span>
                    <span class="card-meta-val">${r.cook}</span>
                  </div>
                  <div class="card-meta-item">
                    <span class="card-meta-label">Serves</span>
                    <span class="card-meta-val">${r.serves}</span>
                  </div>
                </div>
                <div class="card-arrow">Open recipe →</div>
              </div>
            </a>
          `).join('')}
          <div class="card-empty">
            <div class="card-empty-icon">＋</div>
            <div class="card-empty-text">More recipes coming soon…</div>
          </div>
        </div>
      </div>
    `;
  }
  main.innerHTML = html;

  // Update hero counts
  document.getElementById("total-recipes").textContent = recipes.length;
  document.getElementById("total-categories").textContent = Object.keys(categoryMap).length;
}

function setFilter(tag) {
  activeFilter = tag;
  buildFilterBar();

  const cards = document.querySelectorAll(".card");
  let anyVisible = false;

  cards.forEach(card => {
    if (tag === "All") {
      card.classList.remove("hidden");
      anyVisible = true;
    } else {
      const tags = card.dataset.tags.split(",");
      if (tags.includes(tag)) {
        card.classList.remove("hidden");
        anyVisible = true;
      } else {
        card.classList.add("hidden");
      }
    }
  });

  // Hide/show categories based on whether they have visible cards
  document.querySelectorAll(".category").forEach(cat => {
    const visibleCards = cat.querySelectorAll(".card:not(.hidden)");
    cat.classList.toggle("hidden", visibleCards.length === 0);
  });

  document.getElementById("no-results").style.display = anyVisible ? "none" : "block";
}

buildFilterBar();
buildRecipes();
</script>

</body>
</html>
